<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Flashcard — Traduzione AI</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d5a27">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flashcard">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <header>
    <div class="hl">
      <h1>Flashcard — Traduzione AI</h1>
      <p>parole · phrasal verbs · idioms · frasi</p>
    </div>
    <div class="nav">
      <button class="nb on" id="nb-cards" onclick="showView('cards')">Vocabolario</button>
      <button class="nb" id="nb-quiz" onclick="showView('quiz')">Quiz</button>
      <button class="nb" id="nb-stats" onclick="showView('stats')">Statistiche</button>
    </div>
  </header>

  <!-- VOCABOLARIO -->
  <div id="view-cards">
    <div class="syncbar">
      <div class="sync-dot loading" id="sync-dot"></div>
      <span class="sync-lbl" id="sync-lbl">Connessione a Firebase...</span>
      <button class="bsm" onclick="document.getElementById('filein').click()">⬆ Importa</button>
      <button class="bsm" onclick="removeDuplicates()">Rimuovi duplicati</button>
      <input type="file" id="filein" accept=".json" style="display:none" onchange="importFromFile(event)">
    </div>
    <div class="api">
      <label>API Key:</label>
      <input type="password" id="akey" placeholder="sk-ant-..." oninput="chkKey()">
      <span class="ast no" id="ast">non impostata</span>
    </div>
    <div class="searchbar">
      <input type="text" id="search" placeholder="Cerca nel vocabolario..." oninput="renderCards()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <span class="search-count" id="search-count"></span>
    </div>
    <div class="insec">
      <div class="dtog">
        <button class="db on" id="db-fwd" onclick="setDir('fwd')">Straniero → Italiano</button>
        <button class="db" id="db-rev" onclick="setDir('rev')">Italiano → Straniero</button>
      </div>
      <div class="irow">
        <select id="lang" onchange="setDir(iDir)">
          <option value="en">Inglese</option>
          <option value="es">Spagnolo</option>
          <option value="fr">Francese</option>
          <option value="de">Tedesco</option>
          <option value="pt">Portoghese</option>
          <option value="ja">Giapponese</option>
          <option value="zh">Cinese</option>
          <option value="ru">Russo</option>
          <option value="ar">Arabo</option>
        </select>
        <input type="text" id="win" placeholder="Inserisci una parola..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button class="bpri" onclick="addCard()">Aggiungi</button>
      </div>
      <div class="hint" id="hint"></div>
    </div>
    <div class="tbar">
      <span class="cnt" id="cnt"></span>
      <button class="bclr" id="bclr" style="display:none" onclick="clearAll()">Cancella tutto</button>
    </div>
    <div id="clist"></div>
    <div class="tcost" id="tcost"></div>
  </div>

  <!-- QUIZ -->
  <div id="view-quiz">
    <div class="qempty" id="qempty">Nessuna flashcard disponibile.<br>Aggiungi qualche parola prima.</div>
    <div id="qmain" style="display:none">
      <div class="qmbar">
        <button class="qmb on" id="qm-mixed" onclick="setQMode('mixed')">Misto</button>
        <button class="qmb" id="qm-fwd" onclick="setQMode('fwd')">Straniero→IT</button>
        <button class="qmb" id="qm-rev" onclick="setQMode('rev')">IT→Straniero</button>
        <button class="qmb" id="qm-hard" onclick="setQMode('hard')">Difficili</button>
        <button class="qmb" id="qm-mc" onclick="setQMode('mc')">Scelta multipla</button>
      </div>
      <div class="qlangbar">
        <span class="qlang-lbl">Lingua:</span>
        <select id="qlang" onchange="startQuiz()">
          <option value="all">Tutte</option>
          <option value="en">Inglese</option>
          <option value="es">Spagnolo</option>
          <option value="fr">Francese</option>
          <option value="de">Tedesco</option>
          <option value="pt">Portoghese</option>
          <option value="ja">Giapponese</option>
          <option value="zh">Cinese</option>
          <option value="ru">Russo</option>
          <option value="ar">Arabo</option>
        </select>
      </div>
      <div class="qprog">
        <div class="qpw"><div class="qpf" id="qpf" style="width:0%"></div></div>
        <span class="qpl" id="qpl">0 / 0</span>
      </div>
      <div class="qcard">
        <div class="qql" id="qql">—</div>
        <div class="qw" id="qqw">—</div>
        <div class="qmeta">
          <span class="tb" id="qtb"></span>
          <span style="font-size:11px;color:var(--tx3);font-family:'Courier New',monospace" id="qll"></span>
          <button id="bspeak" onclick="speakWord()" title="Pronuncia">🔊</button>
        </div>
      </div>
      <div id="qmc-opts"></div>
      <div class="qirow" id="qirow">
        <input type="text" class="qi" id="qi" placeholder="Scrivi la traduzione..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button class="bchk" id="bchk" onclick="checkAns()">Controlla</button>
      </div>
      <div class="qactions" id="qwrite-actions">
        <button class="bact" id="brev" onclick="revealAns()">Mostra risposta</button>
        <button class="bact" id="bskip" onclick="skipQ()">Salta</button>
      </div>
      <div class="qfb" id="qfb">
        <div class="qft" id="qft"></div>
        <div class="qfd" id="qfd"></div>
      </div>
      <button class="bnxt" id="bnxt" onclick="nextQ()">Prossima →</button>
    </div>
    <div class="qscore" id="qscore">
      <div class="snum" id="snum">0/0</div>
      <div class="slbl" id="slbl2"></div>
      <br>
      <button class="brst" onclick="startQuiz()">Ricomincia</button>
    </div>
  </div>

  <!-- STATISTICHE -->
  <div id="view-stats">
    <div class="stats-grid" id="stats-overview"></div>
    <div id="stats-list"></div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
